project:
  name: qmshe-rag
  seed: 42
data:
  chunk_tokens: 512
  min_tokens: 160
  max_tokens: 768
  overlap_tokens: 96
encoder:
  model_name: BAAI/bge-m3
  frozen: true
  normalize: true
  output_dim: 1024
reranker:
  model_name: BAAI/bge-reranker-v2-m3
llm:
  model_name: deepseek-v4-flash
projection:
  raw_dim: 256
  band_dim: 128
hypergraph:
  use_role_aware: false
  min_edge_size: 2
  max_edge_size: 12
  confidence_threshold: 0.65
semantic_graph:
  k: 15
  threshold: 0.72
  mutual_knn: true
  max_degree: 40
spectral:
  method: chebyshev
  order: 5
  bands: [low, mid, high]
  learnable_coefficients: true
  raw_residual: true
query:
  seed_top_m: 64
  temperature: 0.05
  gate_hidden_dim: 256
retrieval:
  top_k_entities: 20
  top_k_hyperedges: 30
  rerank_top_n: 50
  final_context_items: 12
  fusion: rrf
training:
  batch_size: 32
  learning_rate: 0.0002
  epochs: 10
  mixed_precision: bf16
  gradient_clip: 1.0
loss:
  ret: 1.0
  bridge: 0.5
  rank: 0.2
  reconstruction: 0.05
  diversity: 0.01
  gate: 0.01

