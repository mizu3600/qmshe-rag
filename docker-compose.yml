services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qmshe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qmshe-local-only}
      POSTGRES_DB: ${POSTGRES_DB:-qmshe}
    ports: ["55432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qmshe}"]
      interval: 5s
      timeout: 3s
      retries: 20
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/qmshe-local-only}
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-qmshe}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-qmshe-local-only}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --serve-artifacts --artifacts-destination /mlflow/artifacts
    ports: ["5001:5000"]
    volumes: ["mlflow_data:/mlflow"]

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  redis_data:
  minio_data:
  mlflow_data:
